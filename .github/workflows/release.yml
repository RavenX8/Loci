name: release.yml
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'
      - name: Get Version
        id: get_version
        run: |
          $out = ([xml](Get-Content './Loci/Loci.csproj')).Project.PropertyGroup.Version
          Write-Output "Version String is $out"
          Write-Output "ver=$out".Trim() | Out-File -FilePath "$env:GITHUB_OUTPUT" -Encoding ascii
      - name: Check for Release
        id: check_release_needed
        env:
          VER_STRING: ${{ steps.get_version.outputs.ver }}
        run: |
          $ver = $env:VER_STRING.Trim()
          Write-Output "VerStr=$ver."
          $test = git tag -l | Select-String -Pattern "$ver" -SimpleMatch
          $newtag = 0
          if ($test -eq $null) {
          Write-Output "Detected tag \"$ver\" doesn't exist, trying to create a tag."
          git config --global user.name "Actions User"
          git config --global user.email "actions@github.com"
          git tag $ver
          git push --tags
          $newtag = 1
          }
          Write-Output "New tag needed: $newtag"
          Write-Output "newtag=$newtag" | Out-File -FilePath "$env:GITHUB_OUTPUT"
          exit 1
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x.x'
      - name: Restore Dependencies
        run: dotnet restore
      - name: Fetch Dalamud
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile latest.zip
          Expand-Archive -Force latest.zip "$env:AppData\XIVLauncher\addon\Hooks\dev"
      - name: Build
        run: |
          dotnet build --no-restore --configuration Release --nologo
      - name: Archive
        run: Compress-Archive -path "Loci/bin/x64/Release/*" -DestinationPath "Loci.zip"
      - name: Upload Build Artifact
        if: ${{ steps.check_release_needed.outputs.newtag == true }}
        uses: actions/upload-artifact@v4.6.2
        with:
          path: |
            .Loci/bin/x64/Release/*
      - name: Create Release
        if: ${{ steps.check_release_needed.outputs.newtag == true }}
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get_version.outputs.ver }}
          release_name: Loci ${{ steps.get_version.outputs.ver }}
          draft: 'false'
          prerelease: 'false'
      - name: Upload Release Asset
        if: ${{ steps.check_release_needed.outputs.newtag == true }}
        id: upload_release_asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./Loci.zip
          asset_name: Loci.zip
          asset_content_type: application/zip
      - name: Update repo.json
        if: ${{ steps.check_release_needed.outputs.newtag == true }}
        run: |
          $ver = '${{ steps.get_version.outputs.ver }}'
          $path = './repo.json'
          $json = Get-Content -Raw $path | ConvertFrom-Json
          $json[0].AssemblyVersion = $ver
          $json[0].DownloadLinkInstall = ${{ steps.upload_release_asset.outputs.browser_download_url }}
          $json[0].DownloadLinkUpdate = ${{ steps.upload_release_asset.outputs.browser_download_url }}
          $json[0].DownloadLinkTesting = ${{ steps.upload_release_asset.outputs.browser_download_url }}
          $content = $json | ConvertTo-Json -AsArray
          set-content -Path $path -Value $content
      - name: Commit repo.json
        if: ${{ steps.check_release_needed.outputs.newtag }}
        run: |
          git config --global user.name "Actions User"
          git config --global user.email "actions@github.com"
          git fetch origin main
          git branch -f main ${{ github.sha }}
          git checkout main
          git add repo.json
          git commit -m "[CI] Updating repo.json for ${{ steps.get_version.outputs.ver }}\n\nskip-checks:true" || true
          git push origin main
